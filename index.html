<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北大侯爵</title>
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="styles.css">
    <!-- 引入Google Fonts字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google Logo" width="92" height="30">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">MyPortfolio</h1>
            <ul class="nav-menu">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于我</a></li>
                <li><a href="#skills">技能</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页横幅 -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>你好，我是 张三</h1>
            <p>一名充满热情的前端开发工程师</p>
            <button class="cta-button">开始探索</button>
        </div>
    </section>

    <!-- 关于我部分 -->
    <section id="about" class="about">
        <div class="container">
            <h2>关于我</h2>
            <div class="profile-card">
                <img src="https://th.bing.com/th/id/ODF.B5YytKASjKp3aLBDePpD1A?w=32&h=32&qlt=90&pcl=fffffc&o=6&pid=1.2" alt="我的头像" class="profile-img">
                <div class="profile-text">
                    <p>欢迎来到我的个人网站！我是一名专注于构建美观且用户友好的网页应用的开发者。我热爱学习新技术，并致力于将创意转化为现实。</p>
                    <p>拥有超过3年的行业经验，我精通HTML、CSS和JavaScript，并对React等现代框架有深入的实践。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 技能部分 -->
    <section id="skills" class="skills">
        <div class="container">
            <h2>我的技能</h2>
            <div class="skill-badges">
                <span class="badge">HTML5</span>
                <span class="badge">CSS3</span>
                <span class="badge">JavaScript</span>
                <span class="badge">React</span>
                <span class="badge">Git</span>
                <span class="badge">Node.js</span>
            </div>
        </div>
    </section>

    <!-- 联系我部分 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我</h2>
            <form class="contact-form">
                <input type="text" placeholder="您的姓名" required>
                <input type="email" placeholder="您的邮箱" required>
                <textarea placeholder="您的留言..." rows="5" required></textarea>
                <button type="submit">发送消息</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 MyPortfolio. 版权所有.</p>
    </footer>

</body>
</html>
